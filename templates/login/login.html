<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Ingreso de Sistema</title>
</head>
    <body>

    <div class="min-h-screen flex items-center justify-center bg-slate-950 px-4">
        
        <div class="w-full max-w-md">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-blue-600 mb-4 shadow-lg shadow-blue-900/40">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Control de Almacén</h1>
                <p class="text-slate-400 mt-2">Inicia sesión en el panel de control</p>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-lg shadow-xl overflow-hidden">
                <div class="p-8">
                    <form method="POST" action="{% url 'login' %}" class="space-y-6">
                        {% csrf_token %}
                        
                        <div>
                            <label for="email_usuario" class="block text-sm font-medium text-slate-300 mb-2">Correo electrónico</label>
                            <input type="email" name="username" id="email_usuario" required
                                class="block w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-md text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                                placeholder="Correo electrónico">
                        </div>

                        <div>
                            <div class="flex justify-between mb-2">
                                <label for="password" class="text-sm font-medium text-slate-300">Contraseña</label>
                                <a href="#" class="text-xs text-blue-400 hover:text-blue-300 transition-colors">¿Olvidó su clave?</a>
                            </div>
                            <input type="password" name="password" id="password" required
                                class="block w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-md text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                                placeholder="••••••••">
                        </div>

                        <button type="submit" 
                            class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-md shadow-lg transition-colors duration-200">
                            Acceder al Inventario
                        </button>

                        <a href="{% url 'bodega:index' %}">
                            <button type="button" 
                                class="w-full py-3 bg-gray-600 hover:bg-gray-700 text-white font-bold rounded-md shadow-lg transition-colors duration-200 transform active:scale-[0.99] mt-6">
                                Inicio
                            </button>
                        </a>

                    </form>
                

                    {% if form.errors %}
                    <div class="mt-6 p-3 bg-red-900/30 border border-red-800 rounded-md">
                        <p class="text-sm text-red-400 text-center font-medium">Credenciales no válidas. Intente de nuevo.</p>
                    </div>
                    {% endif %}
                </div>

                <div class="px-8 py-4 bg-slate-800/50 border-t border-slate-800 text-center">
                    <span class="text-sm text-slate-400">¿Nuevo empleado?</span>
                    <a href="{% url 'bodega:register' %}" class="ml-1 text-sm font-bold text-white hover:text-blue-400 transition-colors">Solicitar registro</a>
                </div>
            </div>
            
            <p class="text-center mt-8 text-xs text-slate-600 uppercase tracking-widest">WMS v1.0.2 - 2026</p>
        </div>
    </div>
    
</body>
</html>
