<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>{{ title }}</title>
</head>
    <body>

        <div class="min-h-screen bg-slate-950 text-slate-200 flex overflow-hidden">
    
        <input type="checkbox" id="sidebar-mobile-toggle" class="peer hidden" />

        <label for="sidebar-mobile-toggle" 
            class="fixed inset-0 z-40 bg-black/60 opacity-0 invisible peer-checked:opacity-100 peer-checked:visible lg:hidden transition-all duration-300">
        </label>

        <aside class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 border-r border-slate-800 transition-transform duration-300 transform -translate-x-full 
                    peer-checked:translate-x-0 lg:translate-x-0 lg:static lg:inset-0">
            
            <div class="flex items-center justify-center h-16 bg-blue-600 shadow-lg">
                <span class="text-white font-bold tracking-wider uppercase">WMS Almacén</span>
            </div>

            <nav class="mt-6 px-4 space-y-2">

                <a href="{% url 'bodega:dashboard' %}" class="flex items-center px-4 py-3 bg-blue-600/10 text-blue-400 rounded-lg border border-blue-600/50">
                    <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                    Dashboard
                </a>

                <details class="group outline-none">
                    <summary class="flex items-center justify-between px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-all cursor-pointer list-none">
                        <div class="flex items-center">
                            <svg class="h-5 w-5 mr-3 group-open:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                            </svg>
                            <span class="font-medium">Productos</span>
                        </div>
                        <svg class="h-4 w-4 transition-transform duration-300 group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </summary>

                    <div class="mt-1 ml-9 space-y-1 border-l border-slate-800">
                        <a href="{% url 'bodega:dashboard' %}" class="block px-4 py-2 text-sm text-slate-500 hover:text-blue-400 hover:bg-slate-800/50 rounded-md transition-colors">
                            Ver Inventario
                        </a>
                        <a href="{% url 'bodega:crear_producto' %}" class="block px-4 py-2 text-sm text-slate-500 hover:text-blue-400 hover:bg-slate-800/50 rounded-md transition-colors">
                            Ingresar Nuevo
                        </a>
                        <a href="#" class="block px-4 py-2 text-sm text-slate-500 hover:text-blue-400 hover:bg-slate-800/50 rounded-md transition-colors">
                            Editar productos    
                        </a>
                    </div>
                </details>

                <div class="pt-10">
                    <form action="{% url 'logout' %}" method="post">
                        {% csrf_token %}
                        <button type="submit" class="flex items-center w-full px-4 py-3 text-red-400 hover:bg-red-900/20 rounded-lg transition-colors">
                            <svg class="h-5 w-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                            Salir
                        </button>
                    </form>
                </div>

            </nav>
        </aside>

        <div class="flex-1 flex flex-col min-w-0">
            
            <header class="h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-end px-4 lg:px-8">
                
                <label for="sidebar-mobile-toggle" class="p-2 text-slate-400 hover:text-white cursor-pointer lg:hidden">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </label>
                

                <div class="flex items-center space-x-3 border-l border-slate-700 pl-4 justify-end">

                    <div class="w-9 h-9 rounded-lg bg-slate-800 border border-slate-700 flex items-center justify-center text-blue-500 font-bold">
                        {{ user.username|slice:":1"|upper }}
                    </div>

                    <span class="hidden sm:block text-sm font-medium text-slate-300">{{ user.username }}</span>
                    <span class="hidden sm:block text-sm font-medium text-slate-300 italic">{{ user.email }}</span>
                    
                </div>

                <div>
                    <!-- <button type="button" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors">
                        Cerrar sesión
                    </button> -->
                </div>
                
            </header>
            {% block content %}
    
            {% endblock %}
        </div>
    </div>
        


    
    </body>
</html>
